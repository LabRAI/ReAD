name: Mirror to LabRAI

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror repository to LabRAI/ReAD
        env:
          MIRROR_SYNC_TOKEN: ${{ secrets.MIRROR_SYNC }}
          LABRAI_READ_PUSH_TOKEN: ${{ secrets.LABRAI_READ_PUSH_TOKEN }}
        run: |
          TOKEN="${MIRROR_SYNC_TOKEN:-$LABRAI_READ_PUSH_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::Missing MIRROR_SYNC repository secret in XueqiC/ReAD."
            exit 1
          fi
          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"
          git remote add target "https://x-access-token:${TOKEN}@github.com/LabRAI/ReAD.git"
          git push --prune target \
            "+refs/remotes/origin/*:refs/heads/*" \
            "+refs/tags/*:refs/tags/*"
