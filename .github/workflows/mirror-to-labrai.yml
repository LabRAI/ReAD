name: Mirror to LabRAI

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror repository to LabRAI/ReAD
        env:
          MIRROR_SYNC_TOKEN: ${{ secrets.MIRROR_SYNC }}
          LABRAI_READ_PUSH_TOKEN: ${{ secrets.LABRAI_READ_PUSH_TOKEN }}
          SOURCE_TOKEN: ${{ github.token }}
        run: |
          TOKEN="${MIRROR_SYNC_TOKEN:-$LABRAI_READ_PUSH_TOKEN}"
          test -n "$TOKEN"
          git clone --mirror "https://x-access-token:${SOURCE_TOKEN}@github.com/XueqiC/ReAD.git" repo.git
          cd repo.git
          git remote set-url --push origin "https://x-access-token:${TOKEN}@github.com/LabRAI/ReAD.git"
          git push --mirror
